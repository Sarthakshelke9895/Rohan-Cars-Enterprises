<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Google indexed logo / favicon -->
    <link rel="icon" href="/Weblogo2.png" type="image/png" sizes="512x512" />
    <link rel="apple-touch-icon" href="/Weblogo2.png" />

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Browser Theme Color -->
    <meta name="theme-color" content="#000000" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://rohancarservice.in/" />

    <!-- Google Search Console Verification -->
    <meta
      name="google-site-verification"
      content="mXCytZn-1e-IsvuFds9Avz-vuf_XJn2jxI4YrH3hxGk"
    />

    <!-- SEO Meta Description -->
    <meta
      name="description"
      content="Rohan Cab Service provides reliable car rental, local cab service, airport pickup, outstation trips and clean, comfortable cars for travel."
    />

    <!-- SEO Keywords -->
    <meta
      name="keywords"
      content="Rohan Cab Service, car rental, cab service, Pune cab service, outstation cab, airport pickup, local taxi, car booking, cab booking"
    />

    <!-- Author -->
    <meta name="author" content="Rohan Cab Service" />

    <!-- Open Graph / Social Media Preview -->
    <meta property="og:title" content="Rohan Cab Service | Car Rental & Cab Booking" />
    <meta property="og:site_name" content="Rohan Cab Service" />
    <meta
      property="og:description"
      content="Book clean and reliable cars for local travel, airport pickup, outstation trips and clean cab rental services."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rohancarservice.in/" />
    <meta property="og:image" content="https://rohancarservice.in/Weblogo2.png" />

    <!-- Twitter / WhatsApp Preview Support -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rohan Cab Service | Car Rental & Cab Booking" />
    <meta
      name="twitter:description"
      content="Reliable car rental, cab booking, airport pickup, outstation trips and local travel service."
    />
    <meta name="twitter:image" content="https://rohancarservice.in/Weblogo2.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Website Structured Data for Google Site Name -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Rohan Cab Service",
        "alternateName": "Rohan Cab Services",
        "url": "https://rohancarservice.in/"
      }
    </script>

    <!-- Business Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "TaxiService",
        "name": "Rohan Cab Service",
        "url": "https://rohancarservice.in/",
        "logo": "https://rohancarservice.in/Weblogo2.png",
        "image": "https://rohancarservice.in/Weblogo2.png",
        "description": "Rohan Cab Service provides reliable car rental, local cab service, airport pickup, outstation trips and clean, comfortable cars for travel.",
        "areaServed": {
          "@type": "Place",
          "name": "Pune"
        },
        "serviceType": [
          "Car Rental",
          "Cab Booking",
          "Airport Pickup",
          "Outstation Cab",
          "Local Taxi Service"
        ]
      }
    </script>

    <!-- Website Title -->
    <title>Rohan Cab Service | Car Rental & Cab Booking</title>

    <!-- Black background for initial loading screen -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background-color: #000000;
      }

      #root {
        min-height: 100vh;
        background-color: #000000;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root"></div>
  </body>
</html>
