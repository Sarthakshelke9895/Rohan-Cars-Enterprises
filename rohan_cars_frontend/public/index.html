<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Favicon / Website Logo -->
    <link rel="icon" href="%PUBLIC_URL%/weblogo1.png" type="image/png" />

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Browser Theme Color -->
    <meta name="theme-color" content="#000000" />

    <!-- Google Search Console Verification -->
    <meta
      name="google-site-verification"
      content="mXCytZn-1e-IsvuFds9Avz-vuf_XJn2jxI4YrH3hxGk"
    />

    <!-- SEO Meta Description -->
    <meta
      name="description"
      content="Rohan Cab Service provides reliable car rental, local cab service, airport pickup, outstation trips and clean, comfortable cars for travel."
    />

    <!-- SEO Keywords -->
    <meta
      name="keywords"
      content="Rohan Cab Service, car rental, cab service, Pune cab service, outstation cab, airport pickup, local taxi, car booking, cab booking"
    />

    <!-- Author -->
    <meta name="author" content="Rohan Cab Service" />

    <!-- Open Graph / Social Media Preview -->
    <meta property="og:title" content="Rohan Cab Service | Car Rental & Cab Booking" />
    <meta
      property="og:description"
      content="Book clean and reliable cars for local travel, airport pickup, outstation trips and cab rental services."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rohancarservice.in" />
    <meta property="og:image" content="https://rohancarservice.in/weblogo1.png" />

    <!-- Twitter / WhatsApp Preview Support -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rohan Cab Service | Car Rental & Cab Booking" />
    <meta
      name="twitter:description"
      content="Reliable car rental, cab booking, airport pickup, outstation trips and local travel service."
    />
    <meta name="twitter:image" content="https://rohancarservice.in/weblogo1.png" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/weblogo1.png" />

    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->

    <!-- Website Title -->
    <title>Rohan Cab Service | Car Rental & Cab Booking</title>

    <!-- Black background for white logo and initial loading screen -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background-color: #000000;
      }

      #root {
        min-height: 100vh;
        background-color: #000000;
      }
    </style>
  </head>
